<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TECL — The Everything Challenge List</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Nunito+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<script src="https://www.youtube.com/iframe_api"></script>
<style>
:root {
  --bg: #0a0a0f;
  --bg2: #0f0f18;
  --surface: #1a1a28;
  --surface2: #20202f;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.12);
  --accent: #a78bfa;
  --accent2: #7c3aed;
  --accent3: #c4b5fd;
  --gold: #fbbf24;
  --green: #34d399;
  --text: #e2e8f0;
  --muted: #64748b;
  --muted2: #94a3b8;
  --container: 1200px;
}

/* Base Styles & Scrollbar */
* { box-sizing: border-box; margin: 0; padding: 0; }
body { 
  background: var(--bg); 
  color: var(--text); 
  font-family: 'Nunito Sans', sans-serif; 
  min-height: 100vh;
  overflow-x: hidden;
}
body::-webkit-scrollbar { width: 10px; }
body::-webkit-scrollbar-track { background: var(--bg); }
body::-webkit-scrollbar-thumb { background: var(--surface); border-radius: 5px; border: 2px solid var(--bg); }

/* Header & Nav */
header { 
  background: rgba(10,10,15,0.85); 
  backdrop-filter: blur(15px); 
  border-bottom: 1px solid var(--border); 
  position: sticky; 
  top: 0; 
  z-index: 1000; 
}
.header-inner { 
  max-width: var(--container); 
  margin: 0 auto; 
  display: flex; 
  align-items: center; 
  justify-content: space-between; 
  height: 80px; 
  padding: 0 2rem; 
}
.logo { 
  font-family: 'Nunito', sans-serif; 
  font-weight: 900; 
  font-size: 28px; 
  color: var(--accent3); 
  letter-spacing: -0.5px;
}

.nav-group { display: flex; gap: 15px; }
.nav-pill { 
  font-family: 'Nunito', sans-serif; 
  font-size: 14px; 
  font-weight: 700; 
  padding: 10px 22px; 
  border-radius: 8px; 
  border: 1px solid var(--border2); 
  color: var(--muted2); 
  background: transparent; 
  cursor: pointer; 
  transition: 0.2s ease; 
  text-transform: uppercase; 
}
.nav-pill:hover, .nav-pill.active { 
  border-color: var(--accent); 
  color: var(--accent3); 
  background: rgba(167, 139, 250, 0.08); 
}

/* Search Bar Section */
.hero-controls { 
  max-width: var(--container); 
  margin: 0 auto; 
  padding: 40px 2rem 10px; 
}
.search-wrapper { position: relative; max-width: 500px; }
.search-input { 
  width: 100%; 
  background: var(--surface); 
  border: 1px solid var(--border2); 
  border-radius: 12px; 
  padding: 16px 20px; 
  color: #fff; 
  font-size: 16px; 
  outline: none; 
  transition: 0.2s; 
}
.search-input:focus { border-color: var(--accent); box-shadow: 0 0 0 4px rgba(167, 139, 250, 0.1); }

/* List Styles */
.list-container { 
  max-width: var(--container); 
  margin: 0 auto; 
  padding: 0 2rem 100px; 
}

.level-card { 
  display: flex; 
  background: var(--surface); 
  border: 1px solid var(--border); 
  border-radius: 12px; 
  margin-top: 15px; 
  overflow: hidden; 
  cursor: pointer; 
  transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
}
.level-card:hover { 
  border-color: var(--accent); 
  background: var(--surface2); 
  transform: translateY(-2px);
  box-shadow: 0 10px 30px rgba(0,0,0,0.4);
}

.thumb-area { 
  width: 180px; 
  min-width: 180px; 
  height: 110px; 
  position: relative; 
  background: #000; 
}
.thumb-img { width: 100%; height: 100%; object-fit: cover; opacity: 0.85; transition: 0.3s; }
.level-card:hover .thumb-img { opacity: 1; }
.rank-tag { 
  position: absolute; 
  top: 10px; 
  left: 10px; 
  background: rgba(0,0,0,0.9); 
  padding: 4px 12px; 
  border-radius: 6px; 
  font-weight: 900; 
  font-size: 16px; 
  border: 1px solid var(--border2); 
}

.card-content { flex: 1; padding: 20px 30px; display: flex; flex-direction: column; justify-content: center; }
.level-title { font-size: 24px; font-weight: 900; color: #fff; margin-bottom: 4px; letter-spacing: -0.5px; }
.level-author { font-size: 15px; color: var(--muted2); }
.level-author strong { color: var(--text); }

.card-meta-end { 
  padding: 20px 30px; 
  text-align: right; 
  min-width: 180px; 
  border-left: 1px solid var(--border); 
  display: flex; 
  flex-direction: column; 
  justify-content: center; 
}
.score-value { color: var(--green); font-weight: 900; font-size: 22px; }
.score-label { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }

/* Expanded Panel Detail */
.detail-panel { 
  display: none; 
  background: var(--bg2); 
  border: 1px solid var(--border); 
  border-top: none; 
  border-radius: 0 0 12px 12px; 
  height: 520px; 
  grid-template-columns: 1.4fr 1fr; 
  overflow: hidden; 
}
.detail-panel.open { display: grid; }

.panel-video { padding: 35px; display: flex; flex-direction: column; justify-content: center; }
.panel-info { padding: 35px; overflow-y: auto; background: rgba(255,255,255,0.01); }

.video-wrapper { 
  width: 100%; 
  aspect-ratio: 16 / 9; 
  background: #000; 
  border-radius: 10px; 
  overflow: hidden; 
  box-shadow: 0 15px 45px rgba(0,0,0,0.7); 
}

.section-head { 
  font-size: 13px; 
  text-transform: uppercase; 
  letter-spacing: 2px; 
  color: var(--muted); 
  font-weight: 800; 
  margin-bottom: 20px; 
  border-bottom: 1px solid var(--border); 
  padding-bottom: 10px; 
}

.stat-item { 
  display: flex; 
  justify-content: space-between; 
  padding: 14px 0; 
  border-bottom: 1px solid rgba(255,255,255,0.03); 
  font-size: 15px; 
}
.stat-label { color: var(--muted); }
.stat-val { color: #fff; font-weight: 600; }
.accent-link { color: var(--accent); text-decoration: none; font-weight: 800; }

.victor-row { 
  background: var(--surface); 
  border: 1px solid var(--border2); 
  padding: 16px; 
  border-radius: 10px; 
  display: flex; 
  justify-content: space-between; 
  align-items: center; 
  margin-bottom: 10px; 
}
.victor-name { font-weight: 700; color: #fff; font-size: 15px; }

/* Modal Overlay */
.modal-overlay { 
  display: none; 
  position: fixed; 
  inset: 0; 
  background: rgba(0,0,0,0.9); 
  z-index: 2000; 
  align-items: center; 
  justify-content: center; 
  padding: 20px;
}
.modal-overlay.active { display: flex; }
.modal-box { 
  background: var(--bg2); 
  border: 1px solid var(--border2); 
  width: 100%; 
  max-width: 550px; 
  border-radius: 20px; 
  padding: 50px; 
  position: relative; 
  animation: modalIn 0.3s ease-out;
}
@keyframes modalIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

.close-modal { 
  position: absolute; 
  top: 25px; 
  right: 25px; 
  background: none; 
  border: none; 
  color: var(--muted2); 
  font-size: 24px; 
  cursor: pointer; 
}
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo">TECL</div>
    <div class="nav-group">
      <button class="nav-pill active">List</button>
      <button class="nav-pill" onclick="openModal()">Rules / Submit</button>
    </div>
  </div>
</header>

<div class="hero-controls">
  <div class="search-wrapper">
    <input type="text" class="search-input" id="searchBar" placeholder="Search level, verifier or creator...">
  </div>
</div>

<div class="list-container" id="levelContainer">
  </div>

<div class="modal-overlay" id="rulesModal">
  <div class="modal-box">
    <button class="close-modal" onclick="closeModal()">&times;</button>
    <h2 style="font-family:Nunito; margin-bottom:20px; font-weight:900; font-size:28px;">Submission Rules</h2>
    <p style="color:var(--muted2); line-height:1.7; margin-bottom:30px;">
      1. All completions must have audible clicks/taps.<br>
      2. Raw footage must be provided upon request.<br>
      3. No hacks or frame-alignment allowed.<br>
      4. Cheat indicator must be visible if using MegaHack.
    </p>
    <a href="https://discord.gg/yourlink" target="_blank" class="accent-link" style="font-size:18px;">Join our Discord to submit →</a>
  </div>
</div>

<script>
// --- FULL 24-LEVEL DATASET ---

  {rank:6, name:"Lovesick", verifier:"kitsune", creators:"kitsune", id:"10293850", len:"0:19", date:"May 2024", nong:"#", ytId:"xiSHaVKr6PM", victors:[]},
  {rank:7, name:"SFDW", verifier:"kitsune", creators:"kitsune", id:"10293851", len:"0:25", date:"May 2024", nong:"#", ytId:"bqMdeKvx56A", victors:[]},
  {rank:8, name:"NECRO;MANCY", verifier:"kitsune", creators:"kitsune", id:"10293852", len:"0:34", date:"May 2024", nong:"#", ytId:"nFBjAHO331M", victors:[]},

  {rank:10, name:"Heat Waves", verifier:"kitsune", creators:"kitsune", id:"10293854", len:"0:42", date:"May 2024", nong:"#", ytId:"p6zh6yetKqQ", victors:[]},
  {rank:11, name:"Indigo", verifier:"kitsune", creators:"kitsune", id:"10293855", len:"0:16", date:"May 2024", nong:"#", ytId:"WaBF6w_OnDQ", victors:[]},
  {rank:12, name:"CorroZ", verifier:"kitsune", creators:"kitsune", id:"10293856", len:"0:15", date:"May 2024", nong:"#", ytId:"C-YuzG4qOHI", victors:[]},

  {rank:15, name:"re", verifier:"torn", creators:"torn", id:"10293859", len:"0:12", date:"May 2024", nong:"#", ytId:"Rz7Um6lxYYU", victors:["kitsune"]},
  {rank:16, name:"FINAL FLIGHT", verifier:"Caleger", creators:"Caleger", id:"10293860", len:"0:22", date:"May 2024", nong:"#", ytId:"Nwy9t3gMYQ4", victors:["kitsune"]},
  {rank:17, name:"final; fantasy", verifier:"telepracity", creators:"telepracity", id:"10293861", len:"0:45", date:"May 2024", nong:"#", ytId:"Fb6w_l0Q5DM", victors:["parker","paqoe","kitsune"]},
  {rank:18, name:"VSC", verifier:"Yossarian", creators:"Yossarian", id:"10293862", len:"0:16", date:"May 2024", nong:"#", ytId:"ewlMbTR-c_w", victors:["Diamond","paqoe","kitsune"]},
  {rank:19, name:"EVIL", verifier:"Hellfire2603", creators:"Hellfire2603", id:"10293863", len:"0:51", date:"May 2024", nong:"#", ytId:"sRYv66oZeJk", victors:["kitsune"]},
  {rank:20, name:"Illusion of Hell", verifier:"OverGD", creators:"OverGD", id:"10293864", len:"0:28", date:"May 2024", nong:"#", ytId:"nBmjrlmzUxE", victors:["Diamond","kitsune"]},
  {rank:21, name:"INTERCONNECTED", verifier:"NucGDStuff", creators:"NucGDStuff", id:"10293865", len:"0:33", date:"May 2024", nong:"#", ytId:"wOPLy7rK6pk", victors:["kitsune"]},
  {rank:22, name:"EXPIRATION DATE", verifier:"Quad", creators:"Quad", id:"10293866", len:"0:14", date:"May 2024", nong:"#", ytId:"1nltyMOpLqI", victors:["seels55","kitsune"]},
  {rank:23, name:"anodyne", verifier:"zXdasfa", creators:"zXdasfa", id:"10293867", len:"0:19", date:"May 2024", nong:"#", ytId:"zl7cgZI0jrU", victors:["kitsune"]},
  {rank:24, name:"Oblivers", verifier:"OverGD", creators:"OverGD", id:"10293868", len:"0:44", date:"May 2024", nong:"#", ytId:"cfcVzI2Ag1A", victors:["seels55","kitsune"]}
];

let ytPlayers = {};

// Function: Build the List UI
function buildList(data) {
  const container = document.getElementById('levelContainer');
  container.innerHTML = data.map((l, i) => {
    const victorsMarkup = l.victors.length > 0 
      ? l.victors.map(v => `<div class="victor-row"><span class="victor-name">${v}</span><span style="color:var(--gold); font-weight:900;">100%</span></div>`).join('')
      : '<p style="color:var(--muted); font-size:14px;">No completions recorded.</p>';

    return `
      <div class="level-card" onclick="toggleDetails(${i}, '${l.ytId}')">
        <div class="thumb-area">
          <img src="https://img.youtube.com/vi/${l.ytId}/mqdefault.jpg" class="thumb-img">
          <div class="rank-tag">#${l.rank}</div>
        </div>
        <div class="card-content">
          <div class="level-title">${l.name}</div>
          <div class="level-author">By <strong>${l.creators}</strong> — Verified by <strong>${l.verifier}</strong></div>
        </div>
        <div class="card-meta-end">
          <div class="score-value">${(2500 - (l.rank * 15)).toLocaleString()} pts</div>
          <div class="score-label">Challenge Points</div>
        </div>
      </div>
      <div class="detail-panel" id="detail-${i}">
        <div class="panel-video">
          <div class="section-head">Video Preview</div>
          <div class="video-wrapper"><div id="yt-player-${i}"></div></div>
        </div>
        <div class="panel-info">
          <div class="section-head">Level Details</div>
          <div class="stat-item"><span class="stat-label">ID</span><span class="stat-val">${l.id}</span></div>
          <div class="stat-item"><span class="stat-label">Length</span><span class="stat-val">${l.len}</span></div>
          <div class="stat-item"><span class="stat-label">Date</span><span class="stat-val">${l.date}</span></div>
          <div class="stat-item"><span class="stat-label">NoNG</span><span class="stat-val"><a href="${l.nong}" class="accent-link">Download Link</a></span></div>
          <div class="section-head" style="margin-top:35px">Victors</div>
          ${victorsMarkup}
        </div>
      </div>
    `;
  }).join('');
}

// Function: Toggle Dropdown & Init YT Player
function toggleDetails(index, videoId) {
  const panel = document.getElementById(`detail-${index}`);
  const isCurrentlyOpen = panel.classList.contains('open');

  // Close all other panels
  document.querySelectorAll('.detail-panel').forEach(p => p.classList.remove('open'));

  if (!isCurrentlyOpen) {
    panel.classList.add('open');
    // Lazy-load the YouTube player to prevent lag and Error 153
    if (!ytPlayers[index]) {
      ytPlayers[index] = new YT.Player(`yt-player-${index}`, {
        height: '100%',
        width: '100%',
        videoId: videoId,
        playerVars: { 'rel': 0, 'enablejsapi': 1 }
      });
    }
  }
}

// Function: Real-time Search
document.getElementById('searchBar').addEventListener('input', (e) => {
  const query = e.target.value.toLowerCase();
  const filtered = levelData.filter(l => 
    l.name.toLowerCase().includes(query) || 
    l.verifier.toLowerCase().includes(query) || 
    l.creators.toLowerCase().includes(query)
  );
  buildList(filtered);
});

// Modal Logic
function openModal() { document.getElementById('rulesModal').classList.add('active'); }
function closeModal() { document.getElementById('rulesModal').classList.remove('active'); }

// Initial Render on API Ready
function onYouTubeIframeAPIReady() {
  buildList(levelData);
}
</script>
</body>
</html>
